# 🐍 GitHub Contribution Snake Animation
# 自动更新贪吃蛇贡献动画
name: Generate Snake Animation

on:
  schedule:
    # 每天 UTC 0:00 自动运行一次
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 生成深色主题贪吃蛇
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. 推送到 output 分支
      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 切换到 output 分支（不存在则基于当前 commit 创建孤儿分支）
          if git rev-parse --verify output >/dev/null 2>&1; then
            git checkout output
            git checkout main -- dist/
          else
            git checkout --orphan output
            git rm -rf .
            git checkout main -- dist/
          fi
          # 把 dist/ 下的文件移到根目录
          cp dist/* .
          rm -rf dist
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "🐍 Update snake animation" && git push origin output)
